<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DictateMe</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: rgba(14, 14, 18, 0.88);
    --surface: rgba(28, 28, 35, 0.7);
    --border: rgba(255, 255, 255, 0.06);
    --border-active: rgba(255, 186, 8, 0.3);
    --text: #F2F0ED;
    --text-sec: #9A9AA6;
    --text-muted: #5A5A68;
    --accent: #FFBA08;
    --accent-glow: rgba(255, 186, 8, 0.12);
    --red: #FF5F57;
    --green: #2DD4BF;
    --orange: #FF9F43;
    --radius: 16px;
    --font-sans: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'Cascadia Code', Consolas, 'SF Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: var(--font-sans);
    user-select: none;
    -webkit-user-select: none;
  }

  body { padding: 8px; }

  /* ── Overlay shell ─────────────────────────────── */
  .overlay {
    width: 420px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(40px) saturate(1.6);
    -webkit-backdrop-filter: blur(40px) saturate(1.6);
    box-shadow:
      0 24px 80px rgba(0,0,0,0.45),
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 1px 0 rgba(255,255,255,0.04) inset;
    opacity: 0;
    transform: translateY(8px) scale(0.98);
    transition: opacity 0.3s cubic-bezier(0.16,1,0.3,1),
                transform 0.3s cubic-bezier(0.16,1,0.3,1);
    overflow: hidden;
  }
  .overlay.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .overlay.hiding {
    opacity: 0;
    transform: translateY(-4px) scale(0.98);
    transition-duration: 0.2s;
  }

  /* ── Header ────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .dot.recording {
    background: var(--red);
    box-shadow: 0 0 8px rgba(255,95,87,0.4);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .dot.processing, .dot.reformatting {
    background: var(--orange);
    animation: pulse 1s ease-in-out infinite;
  }
  .dot.ready {
    background: var(--green);
    box-shadow: 0 0 8px rgba(45,212,191,0.25);
  }
  .dot.error {
    background: var(--red);
    box-shadow: 0 0 8px rgba(255,95,87,0.4);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
  }

  .status {
    font-size: 13px; font-weight: 500;
    color: var(--text-sec);
    transition: color 0.3s;
  }
  .status.recording { color: var(--red); }
  .status.processing, .status.reformatting { color: var(--orange); }
  .status.ready { color: var(--green); }
  .status.error { color: var(--red); }

  .copy-btn {
    display: none;
    align-items: center; justify-content: center;
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
    color: var(--text-sec);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .copy-btn:hover {
    border-color: var(--border-active);
    background: var(--accent-glow);
    color: var(--text);
  }
  .copy-btn.show { display: flex; }
  .copy-btn svg { width: 14px; height: 14px; }

  .timer {
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  /* ── Waveform ──────────────────────────────────── */
  .waveform {
    display: none;
    align-items: center; justify-content: center;
    gap: 2px; height: 52px; padding: 8px 18px;
  }
  .waveform.active { display: flex; }
  .waveform .bar {
    width: 3px; border-radius: 2px;
    background: var(--accent);
    height: 4px;
    transition: height 0.08s ease-out;
    opacity: 0.6;
  }

  /* ── Spinner (processing / reformatting) ───────── */
  .spinner-area {
    display: none;
    align-items: center; justify-content: center;
    gap: 10px; height: 52px; padding: 8px 18px;
    color: var(--text-sec); font-size: 13px;
  }
  .spinner-area.active { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Text area ─────────────────────────────────── */
  .text-area {
    padding: 14px 18px;
    min-height: 0;
    max-height: 180px;
    overflow-y: auto;
    display: none;
  }
  .text-area.active { display: block; }
  .text-area::-webkit-scrollbar { width: 3px; }
  .text-area::-webkit-scrollbar-track { background: transparent; }
  .text-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .text {
    font-size: 14px; line-height: 1.65; color: var(--text);
    font-weight: 400; letter-spacing: -0.005em;
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.4s, transform 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  .text.visible { opacity: 1; transform: translateY(0); }
  .placeholder { color: var(--text-muted); font-style: italic; font-weight: 300; }
  .cursor {
    display: inline-block; width: 2px; height: 1em;
    background: var(--accent); margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ── Progress bar ──────────────────────────────── */
  .progress-track {
    height: 2px;
    background: rgba(255,255,255,0.03);
    display: none;
  }
  .progress-track.active { display: block; }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 0 1px 1px 0;
  }

  /* ── Format pills ──────────────────────────────── */
  .formats {
    display: none;
    gap: 5px; padding: 10px 18px 14px;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.3s 0.1s, transform 0.3s 0.1s cubic-bezier(0.16,1,0.3,1);
  }
  .formats.visible {
    display: flex;
    opacity: 1; transform: translateY(0);
  }
  .pill {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    font-size: 11px; font-weight: 500;
    color: var(--text-sec); cursor: default;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .pill .k {
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 600;
    color: var(--accent);
  }
  .pill.active, .pill:hover {
    border-color: var(--border-active);
    background: var(--accent-glow);
    color: var(--text);
  }

  /* ── Sidecar status bar ────────────────────────── */
  .sidecar-bar {
    display: none;
    align-items: center; gap: 8px;
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
  }
  .sidecar-bar.active { display: flex; }
  .sidecar-spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="dot" id="dot"></div>
      <span class="status" id="status">Idle</span>
    </div>
    <div class="header-right">
      <button class="copy-btn" id="copyBtn" title="Copy to clipboard">
        <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
        </svg>
        <svg id="checkIcon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
      <span class="timer" id="timer"></span>
    </div>
  </div>

  <!-- Waveform (recording) -->
  <div class="waveform" id="waveform"></div>

  <!-- Spinner (processing / reformatting) -->
  <div class="spinner-area" id="spinnerArea">
    <div class="spinner"></div>
    <span id="spinnerLabel">Transcribing...</span>
  </div>

  <!-- Transcribed text -->
  <div class="text-area" id="textArea">
    <div class="text" id="text"></div>
  </div>

  <!-- Progress bar -->
  <div class="progress-track" id="progressTrack">
    <div class="progress-fill" id="progress"></div>
  </div>

  <!-- Format pills -->
  <div class="formats" id="formats"></div>

  <!-- Sidecar model status -->
  <div class="sidecar-bar" id="sidecarBar">
    <div class="sidecar-spinner" id="sidecarSpinner"></div>
    <span id="sidecarMsg">Loading speech model...</span>
  </div>
</div>

<script>
(function () {
  const { invoke } = window.__TAURI__.core;
  const { listen } = window.__TAURI__.event;

  /* ── DOM refs ─────────────────────────────────── */
  const overlay      = document.getElementById('overlay');
  const dot          = document.getElementById('dot');
  const statusEl     = document.getElementById('status');
  const timerEl      = document.getElementById('timer');
  const waveform     = document.getElementById('waveform');
  const spinnerArea  = document.getElementById('spinnerArea');
  const spinnerLabel = document.getElementById('spinnerLabel');
  const textArea     = document.getElementById('textArea');
  const textEl       = document.getElementById('text');
  const progressTrack= document.getElementById('progressTrack');
  const progressFill = document.getElementById('progress');
  const formatsEl    = document.getElementById('formats');
  const copyBtn      = document.getElementById('copyBtn');
  const copyIcon     = document.getElementById('copyIcon');
  const checkIcon    = document.getElementById('checkIcon');
  const sidecarBar   = document.getElementById('sidecarBar');
  const sidecarSpinner = document.getElementById('sidecarSpinner');
  const sidecarMsg   = document.getElementById('sidecarMsg');

  /* ── Constants ────────────────────────────────── */
  const FORMAT_KEYS   = ['as_is','formal','casual','email','bullet_points','code_comment','ai_prompt','slack_message'];
  const FORMAT_LABELS = ['As-is','Formal','Casual','Email','Bullets','Code','AI','Slack'];

  /* ── State ────────────────────────────────────── */
  let currentState  = 'hidden';
  let currentText   = '';
  let activePill    = 0;
  let autoInsertMs  = 0;

  /* ── Build format pills ───────────────────────── */
  FORMAT_LABELS.forEach((label, i) => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (i === 0 ? ' active' : '');
    pill.innerHTML = '<span class="k">' + (i + 1) + '</span>' + label;
    pill.addEventListener('click', () => selectFormat(i));
    formatsEl.appendChild(pill);
  });
  const pills = formatsEl.querySelectorAll('.pill');

  /* ── Waveform bars ────────────────────────────── */
  const BARS = 45;
  const bars = [];
  for (let i = 0; i < BARS; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    waveform.appendChild(b);
    bars.push(b);
  }

  let waveActive = false, waveId = null;
  function animWave() {
    if (!waveActive) return;
    const t = performance.now() / 1000;
    for (let i = 0; i < BARS; i++) {
      const center = Math.abs(i - BARS / 2) / (BARS / 2);
      const w1 = Math.sin(t * 3 + i * 0.25) * 0.5 + 0.5;
      const w2 = Math.sin(t * 5.3 + i * 0.18) * 0.3 + 0.5;
      const amp = (1 - center * 0.6) * (w1 * 0.6 + w2 * 0.4);
      bars[i].style.height = (3 + amp * 32) + 'px';
      bars[i].style.opacity = 0.3 + amp * 0.55;
    }
    waveId = requestAnimationFrame(animWave);
  }
  function startWave() {
    waveActive = true;
    waveform.classList.add('active');
    animWave();
  }
  function stopWave() {
    waveActive = false;
    waveform.classList.remove('active');
    if (waveId) { cancelAnimationFrame(waveId); waveId = null; }
    bars.forEach(b => { b.style.height = '4px'; b.style.opacity = '0.6'; });
  }

  /* ── Timer ────────────────────────────────────── */
  let timerStart = 0, timerInt = null;
  function startTimer() {
    timerStart = Date.now();
    updateTimerDisplay();
    timerInt = setInterval(updateTimerDisplay, 200);
  }
  function updateTimerDisplay() {
    const s = Math.floor((Date.now() - timerStart) / 1000);
    timerEl.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }
  function stopTimer() {
    if (timerInt) { clearInterval(timerInt); timerInt = null; }
    timerEl.textContent = '';
  }

  /* ── Progress bar ─────────────────────────────── */
  let progressTimer = null;
  function startProgress(ms) {
    stopProgress();
    autoInsertMs = ms;
    progressTrack.classList.add('active');
    progressFill.style.transition = 'none';
    progressFill.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progressFill.style.transition = 'width ' + ms + 'ms linear';
      progressFill.style.width = '100%';
    }));
  }
  function stopProgress() {
    progressTrack.classList.remove('active');
    progressFill.style.transition = 'none';
    progressFill.style.width = '0%';
    autoInsertMs = 0;
  }

  /* ── Format selection ─────────────────────────── */
  function selectFormat(index) {
    if (currentState !== 'ready') return;
    activePill = index;
    pills.forEach((p, j) => p.classList.toggle('active', j === index));
    invoke('select_format', { formatKey: FORMAT_KEYS[index] });
    if (autoInsertMs > 0) startProgress(autoInsertMs);
  }

  /* ── Copy button ──────────────────────────────── */
  copyBtn.addEventListener('click', () => {
    if (!currentText) return;
    navigator.clipboard.writeText(currentText).then(() => {
      copyIcon.style.display = 'none';
      checkIcon.style.display = 'block';
      setTimeout(() => {
        checkIcon.style.display = 'none';
        copyIcon.style.display = 'block';
      }, 1200);
    });
  });

  /* ── State transitions ────────────────────────── */
  function setState(state, data) {
    currentState = state;

    // Reset shared sections
    stopWave();
    spinnerArea.classList.remove('active');
    copyBtn.classList.remove('show');

    if (state === 'hidden') {
      overlay.classList.add('hiding');
      overlay.classList.remove('visible');
      stopTimer();
      stopProgress();
      formatsEl.classList.remove('visible');
      textArea.classList.remove('active');
      return;
    }

    // Show overlay
    overlay.classList.remove('hiding');
    overlay.classList.add('visible');

    // Update dot and status
    dot.className = 'dot ' + state;
    statusEl.className = 'status ' + state;

    if (state === 'recording') {
      statusEl.textContent = 'Recording';
      textArea.classList.add('active');
      textEl.innerHTML = '<span class="placeholder">Speak now...<span class="cursor"></span></span>';
      textEl.classList.add('visible');
      formatsEl.classList.remove('visible');
      stopProgress();
      startWave();
      startTimer();
    }
    else if (state === 'processing') {
      statusEl.textContent = 'Transcribing...';
      spinnerArea.classList.add('active');
      spinnerLabel.textContent = 'Transcribing...';
      textArea.classList.remove('active');
      formatsEl.classList.remove('visible');
      stopTimer();
      stopProgress();
    }
    else if (state === 'reformatting') {
      statusEl.textContent = 'Reformatting...';
      spinnerArea.classList.add('active');
      spinnerLabel.textContent = 'Reformatting...';
      textArea.classList.remove('active');
      formatsEl.classList.remove('visible');
      stopTimer();
      stopProgress();
    }
    else if (state === 'ready') {
      const lang = (data && data.language) || '';
      statusEl.textContent = lang ? 'Ready \u00b7 ' + lang.toUpperCase() : 'Ready';
      stopTimer();
      currentText = (data && data.text) || '';
      textArea.classList.add('active');
      textEl.textContent = currentText;
      textEl.classList.add('visible');
      copyBtn.classList.add('show');
      if (data && data.show_formats) {
        formatsEl.classList.add('visible');
      }
      if (data && data.auto_insert_ms > 0) {
        startProgress(data.auto_insert_ms);
      }
    }
    else if (state === 'error') {
      statusEl.textContent = 'Error';
      stopTimer();
      stopProgress();
      textArea.classList.add('active');
      textEl.innerHTML = '<span class="placeholder">' + escapeHtml((data && data.message) || 'Unknown error') + '</span>';
      textEl.classList.add('visible');
      formatsEl.classList.remove('visible');
      setTimeout(() => {
        if (currentState === 'error') setState('hidden', null);
      }, 3000);
    }
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  /* ── Tauri event listeners ────────────────────── */
  listen('dictation-state', (event) => {
    const { state, data } = event.payload;
    setState(state, data || {});
  });

  listen('sidecar-status', (event) => {
    const { status, model_loaded, message } = event.payload;
    if (status === 'ready' && model_loaded) {
      sidecarBar.classList.remove('active');
    } else if (status === 'error') {
      sidecarSpinner.style.borderTopColor = 'var(--red)';
      sidecarMsg.textContent = message || 'Model error';
      sidecarBar.classList.add('active');
    } else {
      sidecarSpinner.style.borderTopColor = 'var(--accent)';
      sidecarMsg.textContent = message || 'Loading speech model...';
      sidecarBar.classList.add('active');
    }
  });

  /* ── Keyboard handling ────────────────────────── */
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (currentState === 'recording') {
        invoke('cancel_recording');
      } else {
        invoke('dismiss_overlay');
      }
      return;
    }

    if (e.key === 'Enter' && currentState === 'ready') {
      invoke('insert_now');
      return;
    }

    if (currentState === 'ready') {
      const num = parseInt(e.key, 10);
      if (num >= 1 && num <= 8) {
        selectFormat(num - 1);
      }
    }
  });
})();
</script>
</body>
</html>
